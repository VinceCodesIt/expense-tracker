<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.webp" type="image/x-icon" />
  </head>

  <body>
    <div class="container">
      <!-- TOP SECTION -->
      <div class="top-section">
        <div class="header">
          <h1>💸 Expense Tracker</h1>
          <button id="theme-toggle">🌙</button>
        </div>

        <!-- SUMMARY -->
        <div class="summary">
          <h2>Your Balance</h2>
          <p id="balance">Ksh 0.00</p>

          <div class="income-expense">
            <div>
              <h3>Income</h3>
              <p id="income">Ksh 0.00</p>
            </div>

            <div>
              <h3>Expenses</h3>
              <p id="expenses">Ksh 0.00</p>
            </div>
          </div>
        </div>

        <!-- M-PESA PARSER -->
        <div class="mpesa-parser">
          <h3>Paste M-Pesa Message</h3>
          <textarea
            id="mpesa-text"
            placeholder="Paste M-Pesa message here"
          ></textarea>
          <button id="parse-btn">Auto Fill</button>
        </div>

        <!-- ADD TRANSACTION FORM -->
        <div class="form">
          <h3>Add Transaction</h3>

          <input type="text" id="text" placeholder="e.g. Lunch" />
          <input type="number" id="amount" placeholder="Enter amount" />

          <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>

          <!-- CATEGORY (NEW) -->
          <select id="category">
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Bills">💡 Bills</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Other">📦 Other</option>
          </select>

          <button id="add-btn">Add Transaction</button>
        </div>
      </div>

      <!-- TRANSACTIONS -->
      <div class="transactions">
        <h3>History</h3>
        <ul id="list"></ul>
        <p id="empty-msg">No transactions yet</p>
      </div>
      <div class="transactions">
        <h3>Spending Chart</h3>
        <canvas id="expenseChart"></canvas>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
  </body>
</html>
